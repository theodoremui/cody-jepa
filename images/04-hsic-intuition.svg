<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">HSIC as an overlap test</title>
  <desc id="desc">HSIC compares similarity patterns in the attribute space and dynamics space. High alignment means leakage. Low alignment means better separation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1040" height="560" fill="#f8fafc"/>
  <text x="42" y="52" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">HSIC: A Test for Overlapping Information</text>
  <text x="42" y="82" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5563">If two examples are similar in both summaries, HSIC asks whether that pattern happens too often.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="130" width="250" height="300" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="105" y="168" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Attribute similarity K</text>
    <text x="105" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Who looks structurally similar?</text>
    <g transform="translate(105,225)">
      <rect x="0" y="0" width="38" height="38" fill="#166534"/>
      <rect x="42" y="0" width="38" height="38" fill="#86efac"/>
      <rect x="84" y="0" width="38" height="38" fill="#bbf7d0"/>
      <rect x="126" y="0" width="38" height="38" fill="#dcfce7"/>
      <rect x="0" y="42" width="38" height="38" fill="#86efac"/>
      <rect x="42" y="42" width="38" height="38" fill="#166534"/>
      <rect x="84" y="42" width="38" height="38" fill="#bbf7d0"/>
      <rect x="126" y="42" width="38" height="38" fill="#dcfce7"/>
      <rect x="0" y="84" width="38" height="38" fill="#bbf7d0"/>
      <rect x="42" y="84" width="38" height="38" fill="#bbf7d0"/>
      <rect x="84" y="84" width="38" height="38" fill="#166534"/>
      <rect x="126" y="84" width="38" height="38" fill="#86efac"/>
      <rect x="0" y="126" width="38" height="38" fill="#dcfce7"/>
      <rect x="42" y="126" width="38" height="38" fill="#dcfce7"/>
      <rect x="84" y="126" width="38" height="38" fill="#86efac"/>
      <rect x="126" y="126" width="38" height="38" fill="#166534"/>
    </g>
  </g>

  <line x1="335" y1="285" x2="420" y2="285" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="435" y="130" width="250" height="300" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="470" y="168" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Dynamics similarity L</text>
    <text x="470" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Who moves similarly?</text>
    <g transform="translate(470,225)">
      <rect x="0" y="0" width="38" height="38" fill="#9a3412"/>
      <rect x="42" y="0" width="38" height="38" fill="#fed7aa"/>
      <rect x="84" y="0" width="38" height="38" fill="#fdba74"/>
      <rect x="126" y="0" width="38" height="38" fill="#ffedd5"/>
      <rect x="0" y="42" width="38" height="38" fill="#fed7aa"/>
      <rect x="42" y="42" width="38" height="38" fill="#9a3412"/>
      <rect x="84" y="42" width="38" height="38" fill="#fdba74"/>
      <rect x="126" y="42" width="38" height="38" fill="#ffedd5"/>
      <rect x="0" y="84" width="38" height="38" fill="#fdba74"/>
      <rect x="42" y="84" width="38" height="38" fill="#fdba74"/>
      <rect x="84" y="84" width="38" height="38" fill="#9a3412"/>
      <rect x="126" y="84" width="38" height="38" fill="#fed7aa"/>
      <rect x="0" y="126" width="38" height="38" fill="#ffedd5"/>
      <rect x="42" y="126" width="38" height="38" fill="#ffedd5"/>
      <rect x="84" y="126" width="38" height="38" fill="#fed7aa"/>
      <rect x="126" y="126" width="38" height="38" fill="#9a3412"/>
    </g>
  </g>

  <line x1="700" y1="285" x2="785" y2="285" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="800" y="130" width="190" height="300" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="830" y="168" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Overlap score</text>
    <rect x="834" y="210" width="125" height="48" rx="10" fill="#fee2e2" stroke="#ef4444"/>
    <text x="856" y="240" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">High HSIC</text>
    <text x="826" y="292" font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151">Same pairs are close</text>
    <text x="826" y="312" font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151">in both spaces.</text>
    <rect x="834" y="350" width="125" height="48" rx="10" fill="#dcfce7" stroke="#22c55e"/>
    <text x="858" y="380" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Low HSIC</text>
  </g>

  <text x="90" y="494" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Training goal: lower the overlap score so the attribute summary cannot predict the dynamics summary, and vice versa.</text>
</svg>

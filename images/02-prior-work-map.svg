<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="560" viewBox="0 0 1020 560" role="img" aria-labelledby="title desc">
  <title id="title">How CoDy-JEPA relates to prior work</title>
  <desc id="desc">A comparison of supervised labels, reconstruction, masking, augmentation, JEPA prediction, and CoDy-JEPA's structure and motion separation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1020" height="560" fill="#f8fafc"/>
  <text x="42" y="52" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">From Generic Video Learning to Structure and Motion Separation</text>
  <text x="42" y="82" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5563">CoDy-JEPA keeps the useful idea of prediction, then adds a targeted way to break identity and motion shortcuts.</text>

  <g filter="url(#shadow)">
    <rect x="50" y="130" width="180" height="118" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="72" y="164" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Supervised labels</text>
    <text x="72" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Use pose, action, or</text>
    <text x="72" y="214" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">clinical annotations.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="130" width="180" height="118" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="315" y="164" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Reconstruction</text>
    <text x="315" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Hide pixels, then</text>
    <text x="315" y="214" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">rebuild pixels.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="530" y="130" width="180" height="118" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="565" y="164" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">JEPA</text>
    <text x="555" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Predict useful internal</text>
    <text x="555" y="214" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">summaries, not pixels.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="130" width="200" height="118" rx="14" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <text x="805" y="164" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">CoDy-JEPA</text>
    <text x="795" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#155e75">Predict motion while</text>
    <text x="795" y="214" font-family="Inter, Arial, sans-serif" font-size="13" fill="#155e75">separating structure.</text>
  </g>

  <line x1="235" y1="189" x2="282" y2="189" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="475" y1="189" x2="522" y2="189" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="715" y1="189" x2="762" y2="189" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="190" y="330" width="250" height="132" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="220" y="365" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Generic augmentation</text>
    <text x="220" y="395" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Blend examples or paste image</text>
    <text x="220" y="415" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">regions to improve robustness.</text>
    <text x="220" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#991b1b">Weakness: not motion aware.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="580" y="330" width="250" height="132" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="610" y="365" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Targeted intervention</text>
    <text x="610" y="395" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Swap stable cues and motion</text>
    <text x="610" y="415" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">cues across videos.</text>
    <text x="610" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#065f46">Goal: remove shortcuts.</text>
  </g>

  <line x1="445" y1="396" x2="572" y2="396" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="466" y="382" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">CoDy-JEPA makes</text>
  <text x="460" y="419" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">the swap semantic</text>
</svg>

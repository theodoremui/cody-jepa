<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="t2 d2">
  <title id="t2">Effective rank over training</title>
  <desc id="d2">Effective rank rises from 2.4 to a peak near 11.3 then settles near 10.2, escaping the rank-2 collapse of prior runs, but stays below the healthy threshold of about 19.2.</desc>
  <defs>
    <filter id="sh2" x="-8%" y="-8%" width="116%" height="126%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#111827" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="1200" height="470" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">The headline result: escaping collapse</text>
  <text x="40" y="70" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5563">Effective rank = how many genuinely independent directions the learned features use. More rank = richer, less collapsed representation.</text>

  <!-- axes -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="110" y1="90" x2="760" y2="90"/>
    <line x1="110" y1="162.5" x2="760" y2="162.5"/>
    <line x1="110" y1="235" x2="760" y2="235"/>
    <line x1="110" y1="307.5" x2="760" y2="307.5"/>
  </g>
  <line x1="110" y1="90" x2="110" y2="380" stroke="#334155" stroke-width="2"/>
  <line x1="110" y1="380" x2="760" y2="380" stroke="#334155" stroke-width="2"/>
  <!-- y labels -->
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="end">
    <text x="100" y="384">0</text><text x="100" y="311.5">5</text><text x="100" y="239">10</text><text x="100" y="166.5">15</text><text x="100" y="94">20</text>
  </g>
  <text x="42" y="240" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#374151" transform="rotate(-90 42 240)" text-anchor="middle">effective rank</text>
  <!-- x labels -->
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
    <text x="110" y="400">0</text><text x="272.5" y="400">25</text><text x="435" y="400">50</text><text x="597.5" y="400">75</text><text x="760" y="400">100</text>
  </g>
  <text x="435" y="422" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">training epoch</text>

  <!-- healthy threshold -->
  <line x1="110" y1="101.6" x2="760" y2="101.6" stroke="#059669" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="754" y="118" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#047857" text-anchor="end">"healthy" bar ≈ 19.2 (rank ratio 0.05) — not yet reached</text>

  <!-- rank-2 collapse -->
  <line x1="110" y1="351" x2="760" y2="351" stroke="#dc2626" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="118" y="368" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#b91c1c">rank-2 collapse of prior runs 90881 / 91023</text>

  <!-- curve -->
  <polyline fill="none" stroke="#2563eb" stroke-width="3"
    points="116.5,345.2 142.5,291.5 175,272.7 207.5,253.8 240,242.25 272.5,232.1 305,226.3 337.5,221.95 435,216.15 500,220.5 565,224.85 630,227.75 695,232.1 760,232.1"/>
  <g fill="#2563eb">
    <circle cx="116.5" cy="345.2" r="4"/><circle cx="240" cy="242.25" r="4"/><circle cx="435" cy="216.15" r="5" fill="#1d4ed8"/><circle cx="760" cy="232.1" r="4"/>
  </g>
  <text x="122" y="338" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1e40af">start 2.4</text>
  <text x="435" y="207" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1d4ed8" text-anchor="middle">peak 11.3</text>
  <text x="760" y="248" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1e40af" text-anchor="end">settles 10.2</text>

  <!-- side panel -->
  <g filter="url(#sh2)">
    <rect x="810" y="92" width="352" height="300" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="832" y="122" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">What the two verdicts mean</text>

    <circle cx="840" cy="150" r="6" fill="#16a34a"/>
    <text x="856" y="155" font-family="Inter, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#166534">Collapse avoided</text>
    <text x="832" y="176" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">Rank rose ~5× off the rank-2 floor and</text>
    <text x="832" y="193" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">features stayed alive all 100 epochs.</text>

    <circle cx="840" cy="222" r="6" fill="#f59e0b"/>
    <text x="856" y="227" font-family="Inter, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#92400e">Rank ratio 0.027 (need 0.05)</text>
    <text x="832" y="248" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">Rich, but still under-uses the 384-dim</text>
    <text x="832" y="265" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">feature space — room to grow.</text>

    <circle cx="840" cy="294" r="6" fill="#f59e0b"/>
    <text x="856" y="299" font-family="Inter, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#92400e">Wrong-context gap 0.0002 (need 0.001)</text>
    <text x="832" y="320" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">Pair a clip with the wrong person's motion</text>
    <text x="832" y="337" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">history and prediction barely worsens, so the</text>
    <text x="832" y="354" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">model is not yet relying on motion — the key</text>
    <text x="832" y="371" font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#374151">gap to close next.</text>
  </g>
</svg>

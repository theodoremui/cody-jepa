<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">CoDy-JEPA factorization</title>
  <desc id="desc">A video clip is encoded into tokens, scored by temporal variation, and routed into stable attribute and changing dynamics summaries.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; }
      .title { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 15px; fill: #334155; }
      .label { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .small { font-size: 13px; fill: #475569; }
      .formula { font-size: 16px; fill: #111827; font-family: "STIX Two Math", "Cambria Math", "Times New Roman", serif; font-style: italic; }
      .roman { font-style: normal; }
      .sub { font-size: 11px; baseline-shift: sub; }
      .route { fill: none; stroke: #334155; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .guide { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 7; }
    </style>
  </defs>

  <rect width="1280" height="560" fill="#f8fafc"/>
  <text x="48" y="52" class="title">Factorizing stable structure from motion</text>
  <text x="48" y="82" class="body">Low-variation tokens route to <tspan class="formula">S</tspan><tspan class="formula sub">attr</tspan>. High-variation tokens route to <tspan class="formula">S</tspan><tspan class="formula sub">dyn</tspan>.</text>

  <g>
    <rect x="64" y="150" width="260" height="250" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="94" y="187" class="label">Input clip</text>
    <text x="94" y="211" class="formula">x<tspan class="sub">1:T</tspan></text>
    <rect x="94" y="246" width="48" height="88" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <rect x="154" y="236" width="48" height="98" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <rect x="214" y="226" width="48" height="108" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <path d="M94 365 C126 339, 164 391, 205 363 C231 345, 250 350, 282 381" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  </g>

  <path class="route" d="M336 275 H410"/>

  <g>
    <rect x="430" y="132" width="330" height="286" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="462" y="170" class="label">Token encoder</text>
    <text x="462" y="194" class="formula">z<tspan class="sub">t,p</tspan> = f<tspan class="sub">θ</tspan>(x)<tspan class="sub">t,p</tspan></text>
    <text x="462" y="226" class="small">Each token keeps a frame index t</text>
    <text x="462" y="246" class="small">and a patch or body-part index p.</text>

    <g transform="translate(470 282)">
      <rect x="0" y="0" width="44" height="38" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="2"/>
      <rect x="58" y="0" width="44" height="38" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="2"/>
      <rect x="116" y="0" width="44" height="38" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
      <rect x="174" y="0" width="44" height="38" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
      <rect x="0" y="52" width="44" height="38" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="2"/>
      <rect x="58" y="52" width="44" height="38" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="2"/>
      <rect x="116" y="52" width="44" height="38" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
      <rect x="174" y="52" width="44" height="38" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
    </g>
    <text x="462" y="394" class="small">Variation score <tspan class="formula">v</tspan><tspan class="formula sub">p</tspan> separates token groups.</text>
  </g>

  <path class="guide" d="M820 160 V400"/>
  <path class="route" d="M772 244 H820 V208 H890"/>
  <path class="route" d="M772 324 H820 V348 H890"/>

  <g>
    <rect x="910" y="122" width="304" height="158" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="942" y="160" class="label">Stable attribute stream</text>
    <text x="942" y="188" class="formula">S<tspan class="sub">attr</tspan></text>
    <text x="942" y="222" class="small">Examples: body shape, clothing,</text>
    <text x="942" y="242" class="small">camera view, robot embodiment.</text>
  </g>

  <g>
    <rect x="910" y="318" width="304" height="158" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="942" y="356" class="label">Dynamics stream</text>
    <text x="942" y="384" class="formula">S<tspan class="sub">dyn</tspan></text>
    <text x="942" y="418" class="small">Examples: gait phase, cadence,</text>
    <text x="942" y="438" class="small">foot swing, velocity, contact.</text>
  </g>

  <text x="64" y="504" class="small">Reading left to right: encode the clip, score token variation over time, then route evidence into separate summaries.</text>
</svg>

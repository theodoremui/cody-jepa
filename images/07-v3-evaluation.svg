<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="540" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">CoDy-JEPA evaluation grid</title>
  <desc id="desc">A probe table shows that stable labels should be easy from the attribute stream, motion labels should be easy from the dynamics stream, and shortcut labels should remain limited.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; }
      .title { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 15px; fill: #334155; }
      .head { font-size: 15px; font-weight: 700; fill: #0f172a; }
      .cell { font-size: 14px; fill: #111827; }
      .small { font-size: 13px; fill: #475569; }
      .formula { font-size: 15px; fill: #111827; font-family: "STIX Two Math", "Cambria Math", "Times New Roman", serif; font-style: italic; }
      .sub { font-size: 10px; baseline-shift: sub; }
      .tag-good { font-size: 13px; font-weight: 700; fill: #047857; }
      .tag-low { font-size: 13px; font-weight: 700; fill: #b45309; }
    </style>
  </defs>

  <rect width="1280" height="540" fill="#f8fafc"/>
  <text x="48" y="52" class="title">Evaluation checks the information pattern</text>
  <text x="48" y="82" class="body">Freeze the encoders, train simple probes, and measure what each stream reveals.</text>

  <g>
    <rect x="80" y="128" width="1120" height="292" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="80" y="128" width="1120" height="68" rx="8" fill="#f1f5f9"/>
    <line x1="80" y1="196" x2="1200" y2="196" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="80" y1="270" x2="1200" y2="270" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="80" y1="344" x2="1200" y2="344" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="560" y1="128" x2="560" y2="420" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="880" y1="128" x2="880" y2="420" stroke="#cbd5e1" stroke-width="2"/>

    <text x="114" y="169" class="head">Probe target</text>
    <text x="594" y="169" class="head"><tspan class="formula">S</tspan><tspan class="formula sub">attr</tspan> should</text>
    <text x="914" y="169" class="head"><tspan class="formula">S</tspan><tspan class="formula sub">dyn</tspan> should</text>

    <text x="114" y="236" class="cell">Identity, body shape, robot morphology</text>
    <rect x="594" y="215" width="118" height="32" rx="16" fill="#dcfce7"/>
    <text x="620" y="236" class="tag-good">HIGH</text>
    <text x="738" y="236" class="cell">Predict well</text>
    <rect x="914" y="215" width="118" height="32" rx="16" fill="#ffedd5"/>
    <text x="940" y="236" class="tag-low">LOW</text>
    <text x="1058" y="236" class="cell">Leak little</text>

    <text x="114" y="310" class="cell">Gait phase, cadence, speed, action state</text>
    <rect x="594" y="289" width="118" height="32" rx="16" fill="#ffedd5"/>
    <text x="620" y="310" class="tag-low">LOW</text>
    <text x="738" y="310" class="cell">Leak little</text>
    <rect x="914" y="289" width="118" height="32" rx="16" fill="#dcfce7"/>
    <text x="940" y="310" class="tag-good">HIGH</text>
    <text x="1058" y="310" class="cell">Predict well</text>

    <text x="114" y="384" class="cell">Camera, room, dataset source</text>
    <rect x="594" y="363" width="118" height="32" rx="16" fill="#e2e8f0"/>
    <text x="616" y="384" class="small">LIMITED</text>
    <text x="738" y="384" class="cell">Controlled use</text>
    <rect x="914" y="363" width="118" height="32" rx="16" fill="#e2e8f0"/>
    <text x="936" y="384" class="small">LIMITED</text>
    <text x="1058" y="384" class="cell">Controlled use</text>
  </g>

  <g>
    <rect x="80" y="452" width="1120" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="112" y="482" class="small">Report leakage gaps, held-out-user transfer, and ablations without CI-TSI, HSIC, dual streams, or collapse safeguards.</text>
  </g>
</svg>

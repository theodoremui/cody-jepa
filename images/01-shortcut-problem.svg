<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">The shortcut problem in video learning</title>
  <desc id="desc">A video model can mix stable identity cues with changing motion cues, which makes downstream motion predictions depend on identity or background.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="40" y="54" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">The Core Failure Mode: Shortcut Learning</text>
  <text x="40" y="86" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5563">A model may appear to understand motion while using identity, body shape, clothing, or background as shortcuts.</text>

  <g filter="url(#shadow)">
    <rect x="42" y="130" width="215" height="275" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="68" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Walking video</text>
    <rect x="70" y="195" width="50" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="130" y="195" width="50" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="190" y="195" width="50" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <circle cx="95" cy="214" r="9" fill="#1d4ed8"/>
    <path d="M95 224 L95 244 M95 232 L84 241 M95 232 L107 241 M95 244 L84 256 M95 244 L109 255" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="155" cy="214" r="9" fill="#1d4ed8"/>
    <path d="M155 224 L153 244 M154 232 L142 237 M154 232 L166 240 M153 244 L142 255 M153 244 L167 253" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="215" cy="214" r="9" fill="#1d4ed8"/>
    <path d="M215 224 L211 244 M213 232 L202 237 M213 232 L225 236 M211 244 L202 252 M211 244 L226 255" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
    <text x="68" y="300" font-family="Inter, Arial, sans-serif" font-size="14" fill="#374151">Contains both:</text>
    <text x="68" y="330" font-family="Inter, Arial, sans-serif" font-size="14" fill="#065f46">Stable cues: person, body, scene</text>
    <text x="68" y="356" font-family="Inter, Arial, sans-serif" font-size="14" fill="#92400e">Changing cues: pose, stride, speed</text>
  </g>

  <line x1="270" y1="270" x2="365" y2="270" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="385" y="130" width="230" height="275" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="420" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Standard summary</text>
    <circle cx="500" cy="260" r="64" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <path d="M455 238 C485 205, 520 315, 548 230" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
    <path d="M448 276 C486 320, 524 202, 555 286" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <text x="432" y="360" font-family="Inter, Arial, sans-serif" font-size="14" fill="#374151">Stable and changing cues</text>
    <text x="454" y="382" font-family="Inter, Arial, sans-serif" font-size="14" fill="#374151">are tangled together.</text>
  </g>

  <line x1="628" y1="270" x2="720" y2="270" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="740" y="130" width="198" height="275" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="770" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Risky output</text>
    <rect x="772" y="205" width="132" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="792" y="231" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#92400e">Gait speed</text>
    <rect x="772" y="265" width="132" height="40" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="790" y="291" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Identity leak</text>
    <text x="770" y="344" font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151">The motion prediction</text>
    <text x="770" y="364" font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151">depends on who appears</text>
    <text x="770" y="384" font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151">in the training data.</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">CoDy-JEPA step by step</title>
  <desc id="desc">Two videos are split into stable and changing cues. Stable cues from video A and motion cues from video B are combined, encoded, regularized, and used to predict future motion.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#111827" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1120" height="650" fill="#f8fafc"/>
  <text x="40" y="52" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">CoDy-JEPA Training Flow</text>
  <text x="40" y="82" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5563">The method breaks the normal link between body identity and motion, then asks the model to predict future movement.</text>

  <g filter="url(#shadow)">
    <rect x="42" y="126" width="190" height="150" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="72" y="160" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Video A</text>
    <rect x="72" y="190" width="46" height="46" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="124" y="190" width="46" height="46" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="176" y="190" width="46" height="46" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="72" y="255" font-family="Inter, Arial, sans-serif" font-size="13" fill="#065f46">Body, size, scene</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="42" y="360" width="190" height="150" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="72" y="394" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Video B</text>
    <rect x="72" y="424" width="46" height="46" rx="8" fill="#ffedd5" stroke="#fb923c"/>
    <rect x="124" y="424" width="46" height="46" rx="8" fill="#ffedd5" stroke="#fb923c"/>
    <rect x="176" y="424" width="46" height="46" rx="8" fill="#ffedd5" stroke="#fb923c"/>
    <text x="72" y="489" font-family="Inter, Arial, sans-serif" font-size="13" fill="#92400e">Pose, stride, speed</text>
  </g>

  <line x1="240" y1="202" x2="325" y2="202" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="240" y1="436" x2="325" y2="436" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="340" y="126" width="210" height="150" rx="14" fill="#ecfdf5" stroke="#10b981"/>
    <text x="370" y="160" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#064e3b">Stable extractor</text>
    <text x="370" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#065f46">Find features that change</text>
    <text x="370" y="214" font-family="Inter, Arial, sans-serif" font-size="13" fill="#065f46">little over time.</text>
    <rect x="380" y="238" width="130" height="24" rx="12" fill="#a7f3d0"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="360" width="210" height="150" rx="14" fill="#fff7ed" stroke="#f97316"/>
    <text x="370" y="394" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#7c2d12">Motion extractor</text>
    <text x="370" y="428" font-family="Inter, Arial, sans-serif" font-size="13" fill="#92400e">Find features that change</text>
    <text x="370" y="448" font-family="Inter, Arial, sans-serif" font-size="13" fill="#92400e">with rhythm or speed.</text>
    <path d="M380 476 C410 448, 430 504, 462 476 C480 458, 495 464, 510 482" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  </g>

  <line x1="560" y1="202" x2="640" y2="292" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="560" y1="436" x2="640" y2="348" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="650" y="250" width="210" height="140" rx="14" fill="#ffffff" stroke="#06b6d4" stroke-width="2"/>
    <text x="685" y="284" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">What if context</text>
    <rect x="690" y="308" width="54" height="42" rx="8" fill="#bbf7d0" stroke="#10b981"/>
    <rect x="765" y="308" width="54" height="42" rx="8" fill="#fed7aa" stroke="#f97316"/>
    <text x="676" y="372" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">Stable A plus motion B</text>
  </g>

  <line x1="870" y1="320" x2="945" y2="320" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="958" y="150" width="120" height="95" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="980" y="185" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Predictor</text>
    <text x="980" y="213" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">Future motion</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="958" y="285" width="120" height="95" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="978" y="320" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">HSIC</text>
    <text x="980" y="348" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">Reduce overlap</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="958" y="420" width="120" height="95" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="980" y="455" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Checks</text>
    <text x="980" y="483" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">No collapse</text>
  </g>

  <line x1="1018" y1="246" x2="1018" y2="278" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1018" y1="382" x2="1018" y2="414" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="92" y="585" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Outcome: the motion summary should explain movement, while the stable summary should explain identity and structure.</text>
</svg>
